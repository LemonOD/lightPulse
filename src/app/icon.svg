<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- A beautiful rounded-rect background with a rich slate dark gradient for depth and contrast -->
  <rect width="32" height="32" rx="8" fill="url(#bg-grad)" />
  <!-- Inner border/stroke for a crisp, glowing glassmorphic overlay -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" stroke="url(#border-grad)" stroke-opacity="0.2" />
  
  <!-- Centered Zap Icon using nested coordinate system for crisp alignment -->
  <svg x="4" y="4" width="24" height="24" viewBox="0 0 24 24" fill="none">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="url(#zap-grad)" filter="url(#glow)" />
  </svg>

  <defs>
    <!-- Sleek slate dark gradient to match modern web design standards -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Light glowing emerald border gradient -->
    <linearGradient id="border-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Vibrant energy gradient from bright light-green to emerald -->
    <linearGradient id="zap-grad" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    
    <!-- Subtle drop-shadow/glow for the lightning bolt -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.5" flood-color="#10b981" flood-opacity="0.6" />
    </filter>
  </defs>
</svg>
